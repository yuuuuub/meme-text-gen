<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情包文案生成器 - Meme Text Gen</title>
<style>
:root {
  --bg: #0f0f1a;
  --card-bg: #1a1a2e;
  --card-hover: #22223a;
  --text: #e0e0e0;
  --text-secondary: #a0a0b8;
  --accent-1: #ff6b6b;
  --accent-2: #ffa94d;
  --accent-3: #ffd43b;
  --accent-4: #69db7c;
  --accent-5: #74c0fc;
  --accent-6: #b197fc;
  --accent-7: #f783ac;
  --accent-8: #63e6be;
  --border: #2a2a3e;
  --input-bg: #12121e;
  --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
  --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
  --gradient-6: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
  --gradient-7: linear-gradient(135deg, #f5576c 0%, #ff6b35 100%);
  --gradient-8: linear-gradient(135deg, #667eea 0%, #00f2fe 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(245, 87, 108, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(182, 151, 252, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

/* Header */
.header { text-align: center; padding: 50px 0 30px; }
.header h1 {
  font-size: 2.8rem; font-weight: 900;
  background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd43b, #69db7c, #74c0fc, #b197fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
}
.header .subtitle { font-size: 1.1rem; color: var(--text-secondary); letter-spacing: 2px; }

/* Phrase of the Day */
.potd-section {
  background: var(--gradient-1); border-radius: 16px; padding: 28px 32px;
  margin-bottom: 28px; text-align: center; position: relative; overflow: hidden;
}
.potd-section::after {
  content: "每日一句"; position: absolute; top: 10px; right: 20px;
  font-size: 0.75rem; opacity: 0.5; letter-spacing: 2px;
}
.potd-label { font-size: 0.85rem; opacity: 0.8; margin-bottom: 6px; letter-spacing: 3px; text-transform: uppercase; }
.potd-text { font-size: 1.6rem; font-weight: 700; line-height: 1.5; }
.potd-category { font-size: 0.85rem; opacity: 0.7; margin-top: 8px; }

/* Hot/Trending */
.trending-section { margin-bottom: 28px; }
.trending-section h3 { font-size: 1.1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.trending-fire { font-size: 1.3rem; }
.trending-list { display: flex; flex-wrap: wrap; gap: 10px; }
.trending-tag {
  background: var(--card-bg); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
  transition: all 0.2s; white-space: nowrap; color: var(--text);
}
.trending-tag:hover { border-color: var(--accent-2); background: var(--card-hover); transform: translateY(-1px); }

/* Search */
.search-section { margin-bottom: 24px; }
.search-wrap { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
.search-input {
  flex: 1; padding: 12px 20px; border-radius: 25px;
  border: 2px solid var(--border); background: var(--input-bg);
  color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.3s;
}
.search-input:focus { border-color: var(--accent-5); }
.search-input::placeholder { color: var(--text-secondary); }
.search-btn {
  padding: 12px 24px; border-radius: 25px; border: none;
  background: var(--gradient-3); color: #fff; font-size: 1rem;
  cursor: pointer; font-weight: 600; transition: opacity 0.3s, transform 0.2s;
}
.search-btn:hover { opacity: 0.9; transform: scale(1.03); }

/* Category Filter */
.category-section { margin-bottom: 24px; }
.category-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.cat-btn {
  padding: 10px 20px; border-radius: 25px; border: 2px solid var(--border);
  background: var(--card-bg); color: var(--text); font-size: 0.9rem;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
}
.cat-btn:hover { border-color: var(--accent-5); transform: translateY(-1px); }
.cat-btn.active {
  background: var(--gradient-3); border-color: transparent; color: #fff; font-weight: 600;
}

/* Generator Controls */
.gen-section { margin-bottom: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; align-items: center; }
.gen-btn {
  padding: 12px 28px; border-radius: 25px; border: none;
  background: var(--gradient-2); color: #fff; font-size: 1rem;
  cursor: pointer; font-weight: 700; transition: all 0.2s; letter-spacing: 1px;
}
.gen-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(245, 87, 108, 0.4); }
.gen-count { color: var(--text-secondary); font-size: 0.9rem; }
.gen-count span { color: var(--accent-2); font-weight: 700; }

/* Cards Grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 32px; }

/* Card */
.phrase-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; transition: all 0.25s;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.phrase-card::before {
  content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
}
.phrase-card[data-cat="职场摸鱼"]::before { background: var(--accent-1); }
.phrase-card[data-cat="学生党"]::before { background: var(--accent-4); }
.phrase-card[data-cat="铲屎官"]::before { background: var(--accent-7); }
.phrase-card[data-cat="干饭人"]::before { background: var(--accent-2); }
.phrase-card[data-cat="单身狗"]::before { background: var(--accent-5); }
.phrase-card[data-cat="打工人"]::before { background: var(--accent-6); }
.phrase-card[data-cat="凡尔赛"]::before { background: var(--accent-8); }
.phrase-card[data-cat="摆烂文学"]::before { background: var(--accent-3); }
.phrase-card:hover { border-color: var(--accent-5); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
.phrase-card.liked { border-color: var(--accent-7); }
.phrase-card.liked::after { content: "❤"; position: absolute; top: 12px; right: 14px; font-size: 1rem; opacity: 0.6; }
.phrase-cat { font-size: 0.75rem; opacity: 0.6; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.phrase-text { font-size: 1.05rem; line-height: 1.6; flex: 1; margin-bottom: 14px; }
.phrase-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.action-btn {
  padding: 6px 14px; border-radius: 15px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 0.8rem;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px;
}
.action-btn:hover { border-color: var(--accent-5); color: var(--text); background: var(--card-hover); }
.action-btn.like-btn.liked { color: var(--accent-7); border-color: var(--accent-7); }
.action-btn.copy-btn.copied { color: var(--accent-4); border-color: var(--accent-4); }

/* Empty State */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 1.1rem; }

/* Submit Section */
.submit-section {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; margin-bottom: 32px;
}
.submit-section h3 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.submit-form { display: flex; flex-direction: column; gap: 12px; }
.submit-row { display: flex; gap: 10px; flex-wrap: wrap; }
.submit-input {
  flex: 1; min-width: 200px; padding: 12px 16px;
  border-radius: 10px; border: 2px solid var(--border);
  background: var(--input-bg); color: var(--text); font-size: 0.95rem; outline: none;
  transition: border-color 0.3s;
}
.submit-input:focus { border-color: var(--accent-5); }
.submit-input::placeholder { color: var(--text-secondary); }
.submit-select {
  padding: 12px 16px; border-radius: 10px; border: 2px solid var(--border);
  background: var(--input-bg); color: var(--text); font-size: 0.95rem; outline: none;
  cursor: pointer; min-width: 160px; transition: border-color 0.3s;
}
.submit-select:focus { border-color: var(--accent-5); }
.submit-btn {
  padding: 12px 28px; border-radius: 10px; border: none;
  background: var(--gradient-4); color: #000; font-size: 1rem;
  cursor: pointer; font-weight: 700; transition: all 0.2s; align-self: flex-start;
}
.submit-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(67, 233, 123, 0.4); }

/* Favorites Section */
.fav-section { margin-bottom: 32px; }
.fav-section h3 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

/* Image Generator Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.75); z-index: 100; display: flex;
  align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; max-width: 600px; width: 100%;
  text-align: center; max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 1.3rem; margin-bottom: 20px; }
.modal canvas { border-radius: 12px; max-width: 400px; width: 100%; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.modal-btn {
  padding: 10px 24px; border-radius: 25px; border: none;
  font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: all 0.2s;
}
.modal-download { background: var(--gradient-3); color: #fff; }
.modal-download:hover { transform: scale(1.03); }
.modal-close { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); }
.modal-close:hover { border-color: var(--text-secondary); }

/* Toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--card-bg); color: var(--text); padding: 12px 24px;
  border-radius: 25px; border: 1px solid var(--border);
  font-size: 0.9rem; z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(-10px); }

/* Stats */
.stats-section { text-align: center; padding: 10px 0 30px; }
.stats-text { font-size: 0.85rem; color: var(--text-secondary); }

/* Footer */
.footer { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px; }

/* Responsive */
@media (max-width: 640px) {
  .header h1 { font-size: 2rem; }
  .potd-text { font-size: 1.2rem; }
  .cards-grid, .fav-grid { grid-template-columns: 1fr; }
  .modal canvas { max-width: 100%; }
}
</style>
</head>
<body>

  <!-- Favorites Section -->

    <h3>❤️ 我的收藏</h3>
    <div class="fav-grid" id="fav-grid"></div>
  </div>

  <!-- Stats -->
  <div class="stats-section">

    <p class="stats-text" style="margin-top:4px;">收藏了 <strong id="fav-count">0</strong> 条文案</p>
  </div>
</div>

<!-- Image Generator Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🖼️ 生成的文案图片</h3>
    <canvas id="meme-canvas" width="400" height="400"></canvas>

      <button class="modal-btn modal-close" id="modal-close">关闭</button>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<div class="footer">
  <p>表情包文案生成器 · 仅供娱乐 · 文案来源于网络和用户贡献</p>
</div>

const categoryKeys = Object.keys(categories);
const categoryColors = {
  "职场摸鱼": "#ff6b6b", "学生党": "#69db7c", "铲屎官": "#f783ac",
  "干饭人": "#ffa94d", "单身狗": "#74c0fc", "打工人": "#b197fc",
  "凡尔赛": "#63e6be", "摆烂文学": "#ffd43b"
};
const bgColors = ['#1a1a2e','#2d1b2e','#1b2e1b','#2e1b1b','#1b1b2e','#2e2e1b','#1b2e2e','#2e1b2e'];

// ===== STATE =====
let allPhrases = [];
let currentFilter = 'all';
let currentSearch = '';
let favorites = new Set(JSON.parse(localStorage.getItem('meme_favorites') || '[]'));
let userPhrases = JSON.parse(localStorage.getItem('meme_user_phrases') || '[]');
let hotPhrases = JSON.parse(sessionStorage.getItem('meme_hot') || '[]');

// ===== BUILD ALL PHRASES =====
function buildAllPhrases() {
  allPhrases = [];
  for (const [cat, phrases] of Object.entries(categories)) {
    for (const text of phrases) {
      allPhrases.push({ text, category: cat, source: 'builtin' });
    }
  }
  // merge user phrases
  for (const up of userPhrases) {
    allPhrases.push({ text: up.text, category: up.category, source: 'user' });
  }
}

// ===== INIT HOT PHRASES =====
function initHotPhrases() {
  if (hotPhrases.length === 0) {
    const pool = allPhrases.filter(p => p.source === 'builtin');
    const shuffled = pool.sort(() => Math.random() - 0.5);
    hotPhrases = shuffled.slice(0, 8).map(p => ({ text: p.text, category: p.category }));
    sessionStorage.setItem('meme_hot', JSON.stringify(hotPhrases));
  }
}

// ===== PHRASE OF THE DAY =====
function setPhraseOfDay() {
  const stored = JSON.parse(localStorage.getItem('meme_potd') || 'null');
  const today = new Date().toDateString();
  let potd;
  if (stored && stored.date === today) {
    potd = stored;
  } else {
    const pool = allPhrases.length > 0 ? allPhrases : [];
    const idx = Math.floor(Math.random() * pool.length);
    const p = pool[idx] || { text: '今天也是美好的一天！', category: '默认' };
    potd = { text: p.text, category: p.category, date: today };
    localStorage.setItem('meme_potd', JSON.stringify(potd));
  }
  document.getElementById('potd-text').textContent = potd.text;
  document.getElementById('potd-category').textContent = '—— ' + potd.category;
}

// ===== RENDER TRENDING =====
function renderTrending() {
  const container = document.getElementById('trending-list');
  container.innerHTML = hotPhrases.map((p, i) =>
    `<span class="trending-tag" data-idx="${i}" title="点击查看">${p.text}</span>`
  ).join('');
  container.querySelectorAll('.trending-tag').forEach(el => {
    el.addEventListener('click', () => {
      const p = hotPhrases[parseInt(el.dataset.idx)];
      document.getElementById('search-input').value = p.text;
      currentSearch = p.text;
      currentFilter = 'all';
      updateCategoryButtons();
      renderCards();
    });
  });
}

// ===== RENDER CATEGORY BUTTONS =====
function renderCategoryButtons() {
  const container = document.getElementById('category-list');
  let html = '<button class="cat-btn active" data-cat="all">全部</button>';
  for (const cat of categoryKeys) {
    html += `<button class="cat-btn" data-cat="${cat}">${cat}</button>`;
  }
  container.innerHTML = html;
  container.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.cat;
      currentSearch = '';
      document.getElementById('search-input').value = '';
      updateCategoryButtons();
      renderCards();
    });
  });
}

function updateCategoryButtons() {
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === currentFilter);
  });
}

// ===== RENDER CARDS =====
function renderCards() {
  const grid = document.getElementById('cards-grid');
  const emptyState = document.getElementById('empty-state');
  let filtered = allPhrases;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.category === currentFilter);
  }
  if (currentSearch) {
    const kw = currentSearch.toLowerCase();
    filtered = filtered.filter(p => p.text.toLowerCase().includes(kw));
  }
  document.getElementById('phrase-count').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    grid.innerHTML = filtered.map((p, i) => {
      const isLiked = favorites.has(p.text);
      return `
        <div class="phrase-card ${isLiked ? 'liked' : ''}" data-cat="${p.category}" data-idx="${i}">
          <div class="phrase-cat">${p.category}${p.source === 'user' ? ' · 用户贡献' : ''}</div>
          <div class="phrase-text">${escapeHtml(p.text)}</div>
          <div class="phrase-actions">
            <button class="action-btn copy-btn" data-text="${escapeHtml(p.text)}" title="复制文案">📋 复制</button>
            <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" data-text="${escapeHtml(p.text)}" title="${isLiked ? '取消收藏' : '收藏'}">${isLiked ? '❤️ 已收藏' : '🤍 收藏'}</button>
            <button class="action-btn share-btn" data-text="${escapeHtml(p.text)}" data-cat="${p.category}" title="生成图片">🖼️ 生成图片</button>
          </div>
        </div>
      `;
    }).join('');

    // Bind events
    grid.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        copyText(btn.dataset.text);
        btn.classList.add('copied');
        btn.textContent = '✅ 已复制';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 复制'; }, 1500);
      });
    });
    grid.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        toggleFavorite(btn.dataset.text);
        renderCards();
        renderFavorites();
        updateStats();
      });
    });
    grid.querySelectorAll('.share-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openImageModal(btn.dataset.text, btn.dataset.cat);
      });
    });
  }
  updateStats();
}

// ===== COPY TEXT =====
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('✅ 文案已复制到剪贴板！');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ 文案已复制到剪贴板！');
  }
}

// ===== TOGGLE FAVORITE =====
function toggleFavorite(text) {
  if (favorites.has(text)) {
    favorites.delete(text);
    showToast('💔 已取消收藏');
  } else {
    favorites.add(text);
    showToast('❤️ 已添加到收藏');
  }
  localStorage.setItem('meme_favorites', JSON.stringify([...favorites]));
}

// ===== SUBMIT PHRASE =====
document.getElementById('submit-btn').addEventListener('click', () => {
  const text = document.getElementById('submit-text').value.trim();
  const category = document.getElementById('submit-category').value;
  if (!text) return showToast('⚠️ 请输入文案内容');
  if (!category) return showToast('⚠️ 请选择分类');
  if (text.length > 120) return showToast('⚠️ 文案不能超过120个字');
  const dup = allPhrases.find(p => p.text === text);
  if (dup) return showToast('⚠️ 这条文案已经存在啦~');
  userPhrases.push({ text, category });
  localStorage.setItem('meme_user_phrases', JSON.stringify(userPhrases));
  buildAllPhrases();
  document.getElementById('submit-text').value = '';
  document.getElementById('submit-category').value = '';
  renderCards();
  renderFavorites();
  showToast('🎉 文案提交成功！感谢贡献~');
  // Also add as trending
  hotPhrases.unshift({ text, category });
  if (hotPhrases.length > 8) hotPhrases.pop();
  sessionStorage.setItem('meme_hot', JSON.stringify(hotPhrases));
  renderTrending();
});

function generateMemeImage(canvas, text, category) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  // Background gradient
  const color = categoryColors[category] || '#667eea';
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, color + '40');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Decorative elements
  ctx.fillStyle = color + '15';
  ctx.beginPath();
  ctx.arc(w * 0.8, h * 0.2, 120, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w * 0.2, h * 0.8, 80, 0, Math.PI * 2);
  ctx.fill();

  // Category badge
  ctx.fillStyle = color;
  ctx.font = 'bold 16px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  const badgeW = ctx.measureText(category).width + 40;
  const badgeH = 32;
  const badgeX = (w - badgeW) / 2;
  const badgeY = 60;
  ctx.beginPath();
  ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 16);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(category, w / 2, badgeY + badgeH / 2 + 6);

  // Main text with word wrapping
  ctx.fillStyle = '#e0e0e0';
  ctx.font = 'bold 24px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  const maxWidth = w - 60;
  const lineHeight = 36;
  const lines = wrapText(ctx, text, maxWidth);
  let y = h / 2 - (lines.length * lineHeight) / 2 + 20;
  for (const line of lines) {
    ctx.fillText(line, w / 2, y);
    y += lineHeight;
  }

  // Footer
  ctx.fillStyle = color + '80';
  ctx.font = '14px "PingFang SC", "Microsoft YaHei", sans-serif';
  ctx.fillText('表情包文案生成器', w / 2, h - 30);

  // Border
  ctx.strokeStyle = color + '30';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, w - 20, h - 20);
}

function wrapText(ctx, text, maxWidth) {
  const lines = [];
  let currentLine = '';
  for (const char of text) {
    const testLine = currentLine + char;
    if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);
  return lines;
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

  renderFavorites();
  updateStats();
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.beginPath();
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
  };
}

init();
</script>
